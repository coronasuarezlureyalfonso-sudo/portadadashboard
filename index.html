<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Games Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1b2838;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  #waves {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .hud-line-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, transparent, #1a9fff, #66c0f4, transparent);
    animation: scan-h 3s linear infinite;
    z-index: 2;
  }
  .hud-line-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, #2a475e, #1a9fff, #2a475e, transparent);
    animation: scan-h 4s linear infinite reverse;
    z-index: 2;
  }
  @keyframes scan-h {
    0%   { background-position: -100% 0; }
    100% { background-position: 200% 0; }
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    animation: fade-in 1s ease both;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap {
    position: relative;
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-halo {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: conic-gradient(#1a9fff, #66c0f4, #a4d007, #1a9fff);
    animation: spin-halo 3s linear infinite;
    z-index: 0;
  }
  .logo-halo::after {
    content: '';
    position: absolute;
    inset: 4px;
    background: #1b2838;
    border-radius: 50%;
  }
  @keyframes spin-halo {
    to { transform: rotate(360deg); }
  }
  .logo {
    position: relative;
    z-index: 1;
    width: 110px; height: 110px;
    border-radius: 50%;
  }

  .dashboard-title {
    font-size: 12px;
    font-weight: 700;
    color: #66c0f4;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-align: center;
    animation: pulse-text 3s ease-in-out infinite;
  }
  @keyframes pulse-text {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 1; }
  }

  .title {
    font-size: 44px;
    font-weight: 800;
    color: #ffffff;
    text-align: center;
    line-height: 1.2;
  }
  .title span {
    color: #1a9fff;
    animation: color-pulse 2s ease-in-out infinite;
  }
  @keyframes color-pulse {
    0%, 100% { color: #1a9fff; text-shadow: 0 0 0px #1a9fff; }
    50%       { color: #66c0f4; text-shadow: 0 0 20px rgba(26,159,255,0.6); }
  }

  .divider {
    width: 70px; height: 3px;
    background: linear-gradient(to right, #1a9fff, #66c0f4);
    border-radius: 2px;
    animation: divider-grow 2s ease-in-out infinite alternate;
  }
  @keyframes divider-grow {
    0%   { width: 50px; opacity: 0.6; }
    100% { width: 100px; opacity: 1; }
  }

  .desc {
    font-size: 14px;
    font-weight: 300;
    color: #c6d4df;
    text-align: center;
    line-height: 1.9;
    max-width: 520px;
  }
  .desc strong { color: #ffffff; font-weight: 600; }

  .chips {
    display: flex;
    gap: 14px;
  }
  .chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(102,192,244,0.2);
    border-radius: 12px;
    padding: 16px 28px;
    text-align: center;
    animation: chip-float 3s ease-in-out infinite;
  }
  .chip:nth-child(2) { animation-delay: 0.5s; }
  .chip:nth-child(3) { animation-delay: 1s; }
  @keyframes chip-float {
    0%, 100% { transform: translateY(0); border-color: rgba(102,192,244,0.2); }
    50%       { transform: translateY(-6px); border-color: rgba(26,159,255,0.6); box-shadow: 0 8px 24px rgba(26,159,255,0.15); }
  }
  .chip-val {
    font-size: 24px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
  }
  .chip-lab {
    font-size: 8px;
    font-weight: 700;
    color: #66c0f4;
    letter-spacing: 2px;
    margin-top: 6px;
  }
</style>
</head>

<script>
const canvas = document.getElementById('waves');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;
function drawWaves() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const waves = [
    { color: 'rgba(26,159,255,0.06)',  amp: 60, freq: 0.008, speed: 0.4, offset: 0 },
    { color: 'rgba(102,192,244,0.05)', amp: 40, freq: 0.012, speed: 0.6, offset: 1.5 },
    { color: 'rgba(164,208,7,0.04)',   amp: 30, freq: 0.006, speed: 0.3, offset: 3 },
    { color: 'rgba(26,159,255,0.04)',  amp: 80, freq: 0.005, speed: 0.2, offset: 5 },
  ];
  waves.forEach(w => {
    ctx.beginPath();
    ctx.moveTo(0, canvas.height / 2);
    for (let x = 0; x <= canvas.width; x += 4) {
      const y = canvas.height / 2
        + Math.sin(x * w.freq + t * w.speed + w.offset) * w.amp
        + Math.sin(x * w.freq * 1.7 + t * w.speed * 1.3 + w.offset) * (w.amp * 0.4);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.closePath();
    ctx.fillStyle = w.color;
    ctx.fill();
  });
  t += 0.03;
  requestAnimationFrame(drawWaves);
}
drawWaves();

function animCount(id, from, to, duration, fmt) {
  const el = document.getElementById(id);
  const s  = performance.now();
  function step(now) {
    const progress = Math.min((now - s) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    const val  = Math.round(from + (to - from) * ease);
    el.textContent = fmt ? fmt(val) : val.toLocaleString();
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = fmt ? fmt(to) : to.toLocaleString();
  }
  requestAnimationFrame(step);
}

setTimeout(() => {
  animCount('c1', 0, 20000, 2000);
  animCount('c2', 0, 21,    1200);
  animCount('c3', 2004, 2023, 1500, v => v + ' – 2023');
}, 800);
</script>
